<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
}

/* GLOW TITLE */
h1{
font-size:48px;
text-align:center;
margin-bottom:10px;
color:white;
text-shadow:
0 0 12px #fff,
0 0 30px #fff,
0 0 60px rgba(255,255,255,.9);
animation:pulse 3s infinite alternate;
}

@keyframes pulse{
from{ text-shadow:0 0 15px #fff;}
to{ text-shadow:0 0 50px #fff;}
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#ddd;
text-shadow:0 0 12px white;
}

.card{
width:440px;
background:rgba(20,20,20,.85);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(255,255,255,.12);
}

label{
display:block;
margin-top:12px;
text-shadow:0 0 8px white;
}

input,textarea{
width:100%;
margin-top:6px;
padding:12px;
border-radius:10px;
border:1px solid #444;
background:#111;
color:white;
}

textarea{
height:110px;
resize:none;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
box-shadow:0 0 25px white;
}

button:hover{
transform:scale(1.03);
}

.disclaimer{
margin-top:12px;
font-size:12px;
color:#bbb;
text-align:center;
}
</style>
</head>

<body>

<div>
<h1>Leave a Message</h1>
<div class="subtitle">Leave us a message via this website</div>

<div class="card">

<label>your roblox username</label>
<input id="rbxUser">

<label>second username</label>
<input id="secondUser">

<label>write question here</label>
<textarea id="question"></textarea>

<button onclick="submitMessage()">Submit</button>

<div class="disclaimer">
pressing submit, you agree your IP will be stored privately for only us.
</div>

</div>
</div>

<script>

async function submitMessage(){

const webhookhttps://discord.com/api/webhooks/1478007485095743588/f86rq4vZKbRnWr4NgwfXlsBNw5BebuTYVoXKxoGgzLpCf2CD0SKS25YlTj_unJdycuz4";

try{

const username=document.getElementById("rbxUser").value.trim();
const secondUser=document.getElementById("secondUser").value.trim();
const question=document.getElementById("question").value.trim();

/* ---------------- IP LOOKUP (WORKS IN BROWSER) ---------------- */

let ip="Unknown";
let country="Unknown";

try{
const ipRes = await fetch("https://ipapi.co/json/");
const ipData = await ipRes.json();
ip = ipData.ip || "Unknown";
country = ipData.country_name || "Unknown";
}catch(e){
console.log("IP lookup failed");
}

/* ---------------- ROBLOX LOOKUP ---------------- */

let robloxEmbed=null;

if(username){

try{

const userLookup = await fetch(
"https://users.roproxy.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

const userData = await userLookup.json();

if(userData.data.length){

const userId=userData.data[0].id;

const profile = await fetch(
`https://users.roproxy.com/v1/users/${userId}`
).then(r=>r.json());

robloxEmbed={
title:username,
url:`https://www.roblox.com/users/${userId}/profile`,
color:3092790,
description:profile.description || "No about me.",
thumbnail:{
url:`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${userId}&size=180x180&format=Png`
}
};

}

}catch(err){
console.log("Roblox lookup failed");
}
}

/* ---------------- FORM EMBED ---------------- */

const formEmbed={
title:"📩 Form Submission",
color:16777215,
description:
`**Question**
${question || "None"}

**Second Username**
${secondUser || "None"}`
};

/* ---------------- IP EMBED ---------------- */

const ipEmbed={
title:"🌎 Connection Info",
color:15158332,
fields:[
{ name:"IP Address", value:ip },
{ name:"Country", value:country }
]
};

/* ---------------- SEND WEBHOOK ---------------- */

const embeds=[];

if(robloxEmbed) embeds.push(robloxEmbed);
embeds.push(formEmbed);
embeds.push(ipEmbed);

await fetch(webhook,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({embeds})
});

alert("Submitted successfully!");

document.querySelectorAll("input,textarea")
.forEach(e=>e.value="");

}catch(err){
console.error(err);
alert("Submission failed — open F12 console.");
}

}
</script>

</body>
</html>
