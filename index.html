<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
}

/* GLOW TITLE */
h1{
font-size:48px;
text-align:center;
margin-bottom:10px;
color:white;
text-shadow:
0 0 10px #fff,
0 0 25px #fff,
0 0 50px rgba(255,255,255,.8);
animation:pulse 3s infinite alternate;
}

@keyframes pulse{
from{ text-shadow:0 0 10px #fff;}
to{ text-shadow:0 0 40px #fff;}
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#ddd;
text-shadow:0 0 10px white;
}

.card{
width:440px;
background:rgba(20,20,20,.85);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(255,255,255,.1);
}

label{
display:block;
margin-top:12px;
text-shadow:0 0 8px white;
}

input,textarea{
width:100%;
margin-top:6px;
padding:12px;
border-radius:10px;
border:1px solid #444;
background:#111;
color:white;
}

textarea{
height:110px;
resize:none;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
box-shadow:0 0 20px white;
}

button:hover{
transform:scale(1.03);
}

.disclaimer{
margin-top:10px;
font-size:12px;
color:#bbb;
text-align:center;
}
</style>
</head>

<body>

<div>
<h1>Leave a Message</h1>
<div class="subtitle">Leave us a message via this website</div>

<div class="card">

<label>your roblox username</label>
<input id="rbxUser">

<label>second username</label>
<input id="secondUser">

<label>write question here</label>
<textarea id="question"></textarea>

<button onclick="submitMessage()">Submit</button>

<div class="disclaimer">
when you press submit, your message is sent to our webhook
</div>

</div>
</div>

<script>

async function submitMessage(){

const webhook =
"PASTE_YOUR_WEBHOOK_URL_HERE"; // <-- IMPORTANT

try{

const username =
document.getElementById("rbxUser").value.trim();

const secondUser =
document.getElementById("secondUser").value.trim();

const question =
document.getElementById("question").value.trim();

if(!username && !question){
alert("Fill something first.");
return;
}

/* ---------------- USER LOOKUP ---------------- */

let userId="Unknown";
let profileDesc="No description.";

if(username){

try{
const res = await fetch(
"https://users.roproxy.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

const data = await res.json();

if(data.data.length){
userId = data.data[0].id;

const profile = await fetch(
`https://users.roproxy.com/v1/users/${userId}`
).then(r=>r.json());

profileDesc = profile.description || profileDesc;
}
}catch(e){
console.log("Roblox lookup failed");
}
}

/* ---------------- EMBEDS ---------------- */

const embeds=[];

/* Roblox Embed */
if(username && userId!=="Unknown"){
embeds.push({
title: username,
url:`https://www.roblox.com/users/${userId}/profile`,
color:3092790,
description:profileDesc,
thumbnail:{
url:`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${userId}&size=180x180&format=Png`
}
});
}

/* Form Embed */
embeds.push({
title:"📩 Form Answers",
color:16777215,
description:
`**First Question**
${question || "None"}

**Second Username**
${secondUser || "None"}`
});

/* ---------------- SEND WEBHOOK ---------------- */

await fetch(webhook,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({embeds})
});

alert("Submitted successfully!");

document.querySelectorAll("input,textarea")
.forEach(e=>e.value="");

}catch(err){
console.error(err);
alert("Failed to send. Check console (F12).");
}
}

</script>

</body>
</html>
