<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
    body {
        background: #000;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        text-align: center;
        width: 90%;
        max-width: 500px;
    }

    /* Glow effect */
    .glow {
        box-shadow: 0 0 10px white,
                    0 0 20px white,
                    0 0 30px rgba(255,255,255,0.6);
    }

    .shield {
        font-size: 70px;
        margin-bottom: 10px;
        text-shadow: 0 0 15px white;
    }

    h1 {
        margin-bottom: 25px;
        text-shadow: 0 0 10px white;
    }

    .label-box {
        background: white;
        color: black;
        padding: 10px;
        margin-top: 15px;
        border-radius: 8px;
    }

    textarea {
        width: 100%;
        height: 100px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        padding: 10px;
        resize: none;
        outline: none;
    }

    .submit-btn {
        margin-top: 25px;
        background: white;
        color: black;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
    }

    .submit-btn:hover {
        transform: scale(1.03);
    }

    .disclaimer {
        font-size: 12px;
        margin-top: 10px;
        opacity: 0.8;
    }

</style>
</head>

<body>

<div class="container">

    <!-- Shield Icon -->
    <div class="shield">🛡️</div>

    <h1>Leave a Message</h1>

    <!-- First box -->
    <div class="label-box glow">
        Write your message below
    </div>

    <textarea id="message"
        placeholder="write your message here.."></textarea>

    <!-- Second box -->
    <div class="label-box glow">
        Anything else?
    </div>

    <textarea id="extra"
        placeholder="tell us here.."></textarea>

    <!-- Submit -->
    <button class="submit-btn glow" onclick="sendMessage()">
        Submit
    </button>

    <div class="disclaimer">
        your answers will be sent to our discord webhook, you agree with that when pressing submit
    </div>

</div>

<script>
async function sendMessage() {

    const message = document.getElementById("message").value;
    const extra = document.getElementById("extra").value;

    if (!message.trim()) {
        alert("Please write a message first.");
        return;
    }

    const webhookURL = "https://discord.com/api/webhooks/1476895719158976588/rGqgXH6Z6eAgUw89AjktTFnj2v0TaiSJA4m3qXeXUdA_5TaFrBfLfmaa9O7D8-FT4ogr";

    const payload = {
        content:
`📩 **New Message Submitted**

**Message:**
${message}

**Anything Else:**
${extra || "None"}`
    };

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        alert("Message sent successfully!");
        document.getElementById("message").value = "";
        document.getElementById("extra").value = "";

    } catch (error) {
        alert("Failed to send message.");
        console.error(error);
    }
}
</script>

</body>
</html>
