<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
}

/* GLOW TITLE */
h1{
font-size:48px;
text-align:center;
margin-bottom:10px;
color:white;
text-shadow:
0 0 15px #fff,
0 0 40px #fff,
0 0 70px rgba(255,255,255,.9);
animation:pulse 3s infinite alternate;
}

@keyframes pulse{
from{ text-shadow:0 0 15px #fff;}
to{ text-shadow:0 0 60px #fff;}
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#ddd;
text-shadow:0 0 10px white;
}

.card{
width:440px;
background:rgba(20,20,20,.85);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(255,255,255,.15);
}

label{
display:block;
margin-top:12px;
text-shadow:0 0 6px white;
}

input,textarea{
width:100%;
margin-top:6px;
padding:12px;
border-radius:10px;
border:1px solid #444;
background:#111;
color:white;
}

textarea{
height:110px;
resize:none;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
box-shadow:0 0 25px white;
}

button:hover{
transform:scale(1.03);
}

.disclaimer{
margin-top:12px;
font-size:12px;
color:#bbb;
text-align:center;
}
</style>
</head>

<body>

<div>
<h1>Leave a Message</h1>
<div class="subtitle">Leave us a message via this website</div>

<div class="card">

<label>your roblox username</label>
<input id="rbxUser">

<label>second username</label>
<input id="secondUser">

<label>write question here</label>
<textarea id="question"></textarea>

<button onclick="submitMessage()">Submit</button>

<div class="disclaimer">
pressing submit, you agree your IP will be stored privately for spam protection.
</div>

</div>
</div>

<script>

async function submitMessage(){

const webhook="https://discord.com/api/webhooks/1478007485095743588/f86rq4vZKbRnWr4NgwfXlsBNw5BebuTYVoXKxoGgzLpCf2CD0SKS25YlTj_unJdycuz4";

/* ---------- FORM VALUES ---------- */

const username=document.getElementById("rbxUser").value.trim();
const secondUser=document.getElementById("secondUser").value.trim();
const question=document.getElementById("question").value.trim();

/* ---------- IP LOOKUP ---------- */

let ip="Unknown";
let country="Unknown";

try{
const ipRes=await fetch("https://ipapi.co/json/");
const ipData=await ipRes.json();
ip=ipData.ip || "Unknown";
country=ipData.country_name || "Unknown";
}catch{
console.log("IP lookup failed");
}

/* ---------- ROBLOX LINK (SIMPLE + RELIABLE) ---------- */

let robloxText="Not provided";

if(username){
robloxText=`[${username}](https://www.roblox.com/search/users?keyword=${encodeURIComponent(username)})`;
}

/* ---------- EMBED ---------- */

const embed={
title:"New Submission",
color:0x000000, /* HEX BLACK */
description:
`**ROBLOX USER**
${robloxText}

**SECOND USERNAME**
${secondUser || "None"}

**QUESTION**
${question || "None"}

**IP**
${ip}

**COUNTRY**
${country}`
};

/* ---------- SEND WEBHOOK ---------- */

try{

const res=await fetch(webhook,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({embeds:[embed]})
});

if(res.ok){
alert("Submitted successfully!");
}else{
alert("Webhook rejected request.");
}

}catch(err){
console.error(err);
alert("Failed to send webhook.");
}

/* clear inputs */
document.querySelectorAll("input,textarea")
.forEach(e=>e.value="");

}

</script>

</body>
</html>
