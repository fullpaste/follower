<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:radial-gradient(circle at top,#111 0%,#000 70%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    text-align:center;
}

h1{
    font-size:40px;
    margin-bottom:8px;
}

.subtitle{
    color:#aaa;
    margin-bottom:25px;
}

.card{
    width:430px;
    background:rgba(20,20,20,0.85);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:25px;
    box-shadow:0 0 40px rgba(255,255,255,0.05);
}

label{
    display:block;
    text-align:left;
    margin:12px 0 6px;
    color:#ccc;
}

input, textarea{
    width:100%;
    background:#151515;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    color:white;
    outline:none;
}

textarea{
    height:95px;
    resize:none;
}

button{
    margin-top:18px;
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:#e6e6e6;
}

.disclaimer{
    margin-top:10px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="wrapper">
<h1>Leave a Message</h1>
<div class="subtitle">Leave us a message via this website</div>

<div class="card">

<label>your roblox username</label>
<input id="rbxUser" placeholder="username...">

<label>second username</label>
<input id="secondUser" placeholder="second username...">

<label>write question here</label>
<textarea id="question"></textarea>

<label>suggestion below</label>
<textarea id="suggestion"></textarea>

<button onclick="submitMessage()">Submit</button>

<div class="disclaimer">
when you press submit, you agree it gets sent to our webhook
</div>

</div>
</div>

<script>
async function submitMessage(){

const webhook="https://discord.com/api/webhooks/1476895719158976588/rGqgXH6Z6eAgUw89AjktTFnj2v0TaiSJA4m3qXeXUdA_5TaFrBfLfmaa9O7D8-FT4ogr";

const rbxUser=document.getElementById("rbxUser").value.trim();
const secondUser=document.getElementById("secondUser").value.trim();
const question=document.getElementById("question").value.trim();
const suggestion=document.getElementById("suggestion").value.trim();

if(!rbxUser && !question && !suggestion){
    alert("Please fill something.");
    return;
}

/* ---------- MAIN FORM EMBED ---------- */

const embeds=[{
title:"📩 New Website Submission",
color:16777215,
description:
`**your roblox username**
${rbxUser || "None"}

**second username**
${secondUser || "None"}

**first questions**
${question || "None"}

**second suggestion**
${suggestion || "None"}`,
timestamp:new Date()
}];

/* ---------- ROBLOX PROFILE STYLE EMBED ---------- */
/* Only sends if first username exists */

if(rbxUser){

embeds.push({
title:`Roblox Profile Lookup`,
color:3092790,
description:
`Profile requested for **${rbxUser}**

Life Is Like A Square
There is 4 Connors

1/4 school
2/4 a job
3/4 retirement
4/4 your death

(Preview-style embed inspired by Roblox profile layout)`,
thumbnail:{
url:`https://robohash.org/${rbxUser}.png?size=180x180`
},
footer:{
text:"Roblox username submission"
}
});

}

try{
await fetch(webhook,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({embeds})
});

alert("Submitted!");
document.querySelectorAll("input,textarea").forEach(e=>e.value="");

}catch{
alert("Failed to send.");
}
}
</script>

</body>
</html>
