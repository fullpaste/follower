<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:radial-gradient(circle at top,#111 0%,#000 70%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:8px;
}

.subtitle{
    color:#aaa;
    margin-bottom:30px;
}

.card{
    width:420px;
    background:rgba(20,20,20,0.85);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:25px;
    box-shadow:0 0 40px rgba(255,255,255,0.05);
}

label{
    display:block;
    text-align:left;
    margin:12px 0 8px;
    color:#ccc;
}

textarea{
    width:100%;
    height:110px;
    background:#151515;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    color:white;
    resize:none;
    outline:none;
}

button{
    margin-top:18px;
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:#e6e6e6;
    transition:.2s;
}

button:hover{
    transform:scale(1.02);
}

.disclaimer{
    margin-top:12px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="wrapper">
    <h1>Leave a Message</h1>
    <div class="subtitle">Leave us a message via this website</div>

    <div class="card">

        <label>write question here</label>
        <textarea id="question" placeholder="write below..."></textarea>

        <label>suggestion below</label>
        <textarea id="suggestion" placeholder="write suggestion..."></textarea>

        <button onclick="submitMessage()">Submit</button>

        <div class="disclaimer">
            when you press submit, you agree it gets sent to our webhook
        </div>

    </div>
</div>

<script>
async function submitMessage() {

    const question = document.getElementById("question").value.trim();
    const suggestion = document.getElementById("suggestion").value.trim();

    if(!question && !suggestion){
        alert("Please write something first.");
        return;
    }

    const webhook =
"https://discord.com/api/webhooks/1476895719158976588/rGqgXH6Z6eAgUw89AjktTFnj2v0TaiSJA4m3qXeXUdA_5TaFrBfLfmaa9O7D8-FT4ogr";

    const payload = {
        embeds: [{
            title: "New user logged.",
            color: 16777215,
            description:
`**first questions**
${question || "None"}

**second suggestion**
${suggestion || "None"}`,
            footer: {
                text: "Message sent from website form"
            },
            timestamp: new Date()
        }]
    };

    try{
        await fetch(webhook,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(payload)
        });

        alert("Submitted successfully!");
        document.getElementById("question").value="";
        document.getElementById("suggestion").value="";
    }catch(e){
        alert("Failed to send message.");
    }
}
</script>

</body>
</html>
